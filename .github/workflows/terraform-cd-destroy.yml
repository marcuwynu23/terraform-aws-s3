name: CD - AWS S3 (Destroy)

on:
  workflow_dispatch:
    inputs:

      source_bucket_prefix:
        description: Prefix for the source S3 bucket name (random suffix appended)
        required: true
        type: string
        default: my-unique-bucket-name-

      logging_bucket_prefix:
        description: Prefix for the logging S3 bucket name (random suffix appended)
        required: true
        type: string
        default: my-unique-logging-bucket-

      bucket_acl:
        description: ACL for both S3 buckets
        required: true
        type: string
        default: private

      log_target_prefix:
        description: Prefix for log objects in the logging bucket
        required: true
        type: string
        default: log/

env:
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
  TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.TF_STATE_REGION }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=$TF_STATE_BUCKET" \
          -backend-config="key=s3/terraform.tfstate" \
          -backend-config="region=$TF_STATE_REGION" \
          -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
          -backend-config="encrypt=true"
    - name: Terraform Plan
      run: |
        terraform plan -destroy \
          -var="source_bucket_prefix=${{ github.event.inputs.source_bucket_prefix }}" \
          -var="logging_bucket_prefix=${{ github.event.inputs.logging_bucket_prefix }}" \
          -var="bucket_acl=${{ github.event.inputs.bucket_acl }}" \
          -var="log_target_prefix=${{ github.event.inputs.log_target_prefix }}"
    - name: Terraform Destroy
      run: |
        terraform destroy -auto-approve \
          -var="source_bucket_prefix=${{ github.event.inputs.source_bucket_prefix }}" \
          -var="logging_bucket_prefix=${{ github.event.inputs.logging_bucket_prefix }}" \
          -var="bucket_acl=${{ github.event.inputs.bucket_acl }}" \
          -var="log_target_prefix=${{ github.event.inputs.log_target_prefix }}"
